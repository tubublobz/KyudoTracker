<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kyudo Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="icons/512_max.png">
</head>

<body>
  <header class="app-header">
    <h1>Kyudo Tracker <span id="app-version" class="version">v0.8.0</span></h1>
    <button id="nav-bows-btn" class="btn-icon-nav" title="Mes arcs">🏹</button>
  </header>
  <div class="date-banner">
    <span class="date-banner-label">Séance du</span>
    <input type="date" id="session-date" class="date-input">
  </div>
  <div id="app-container">
    <!-- Sélection de l'arc -->
    <section class="control-group">
      <h2>Arc</h2>
      <select id="bow-select" class="bow-selector">
        <option value="">Aucun arc sélectionné</option>
        <!-- Les arcs seront chargés en JS -->
      </select>
    </section>
    <!-- Section Makiwara -->
    <section class="control-group">
      <h2>Makiwara</h2>
      <div class="stepper">
        <span class="stepper-label">🎯 Tirs</span>
        <button id="btn-makiwara-minus" class="stepper-btn minus">−</button>
        <span id="count-makiwara" class="stepper-count">0</span>
        <button id="btn-makiwara-plus" class="stepper-btn plus">+</button>
      </div>
    </section>

    <!-- Section Kinteki -->
    <section class="control-group">
      <h2>Kinteki</h2>
      <div class="stepper">
        <span class="stepper-label">✅ Touchés</span>
        <button id="btn-hits-minus" class="stepper-btn minus">−</button>
        <span id="count-hits" class="stepper-count">0</span>
        <button id="btn-hits-plus" class="stepper-btn plus">+</button>
      </div>
      <div class="stepper">
        <span class="stepper-label">❌ Ratés</span>
        <button id="btn-miss-minus" class="stepper-btn minus">−</button>
        <span id="count-miss" class="stepper-count">0</span>
        <button id="btn-miss-plus" class="stepper-btn plus">+</button>
      </div>
      <div class="stats-display">
        <span id="count-kinteki">0</span> tirs | <span id="count-percent">0</span>%
      </div>
    </section>

    <!-- Actions -- mémorial du bouton Enregistrer et Reset, disparus le 21 février 2026 au profit du autoSave !-->
  </div>

  <!-- Écran de gestion des arcs -->
  <div id="bows-screen" style="display:none">
    <header class="bows-header">
      <h1>🏹 Mes arcs</h1>
    </header>
  
    <button id="add-bow-btn" class="btn-primary btn-add-bow">
      + Nouvel arc
    </button>

    <div id="bows-list" class="bows-list">
      <!-- Les cartes d'arcs seront générées ici -->
    </div>

    <button id="back-from-bows-btn" class="btn-secondary">← Retour</button>
  </div>

  <!-- Formulaire arc (modal/overlay) -->
  <div id="bow-form-overlay" class="overlay">
    <div class="bow-form-container">
      <h2 id="bow-form-title">Nouvel arc</h2>

      <form id="bow-form">
        <label>
          Nom de l'arc *
          <input type="text" id="bow-name" required>
        </label>

    <div class="form-row">
      <label>
        Puissance (kg)
        <input type="number" id="bow-strength" step="0.5" min="0">
      </label>

      <label>
        Taille
        <select id="bow-size">
          <option value="">Non précisée</option>
          <option value="namisun">Namisun (並寸)</option>
          <option value="nisun">Nisun (二寸)</option>
          <option value="yonsun">Yonsun (四寸)</option>
          <option value="rokusun">Rokusun (六寸)</option>
          <option value="autre">Autre</option>
        </select>
      </label>
    </div>

        <!-- Bambou masqué - Voir BACKLOG.md -->
        <!--
        <label class="checkbox-label">
          <input type="checkbox" id="bow-bamboo">
          Arc en bambou
        </label>
        -->

        <label>
          Couleur
          <div class="color-picker-wrapper">
            <input type="color" id="bow-color" value="#3498db">
            <span id="bow-color-value">#3498db</span>
          </div>
          <div class="color-suggestions" id="bow-color-suggestions">
            <!-- Pastilles générées en JS -->
          </div>
        </label>

        <label>
          Notes
          <textarea id="bow-notes" rows="3"></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Enregistrer</button>
          <button type="button" id="cancel-bow-form" class="btn-secondary">Annuler</button>
        </div>
      </form>
    </div>
  </div>
  <!-- Historique -->
  <section class="history-section">
    <h2>Historique</h2>
    <ul id="history"></ul>
  </section>

  <!-- Notification de mise à jour -->
  <div id="update-notification" class="update-notification hidden">
    <p>Une nouvelle version est disponible.</p>
    <div class="notification-actions">
      <button id="update-btn" class="btn-update">Mettre à jour</button>
      <button id="close-notification-btn" class="btn-close" aria-label="Fermer">&times;</button>
    </div>
  </div>
  <!-- Container pour les notifications -->
  <div id="toast-container"></div>
  <!-- Scripts -->
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
