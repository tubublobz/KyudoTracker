<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kyudo Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="icons/512_max.png">
</head>

<body>

<div id="sticky-header">
  <header class="app-header">
    <h1>Kyudo Tracker <span id="app-version" class="version">v1.3.1</span></h1>
    <div class="nav-toggle">
      <button id="nav-session-btn" class="nav-toggle-btn active">Séance</button>
      <button id="nav-bows-btn" class="nav-toggle-btn">Arcs</button>
    </div>
  </header>
  <div class="date-banner" id="date-banner">
    <span class="date-banner-label">Séance du</span>
    <input type="date" id="session-date" class="date-input">
  </div>
</div>

  <div id="app-container">
    <div id="rounds-container"></div>
    <div id="round-stats" class="stats-bar"></div>
  </div>

  <!-- Écran de gestion des arcs -->
  <div id="bows-screen" style="display:none">

    <!-- STATS -->
    <section class="bows-section">
      
      <div class="stats-pills" id="stats-pills">
        <h2>Statistiques</h2>
        <button class="stats-pill active" data-period="7">7j</button>
        <button class="stats-pill" data-period="30">30j</button>
        <button class="stats-pill" data-period="90">3 mois</button>
        <button class="stats-pill" data-period="0">Tout</button>
      </div>
      <select id="stats-bow-filter">
        <option value="0">Tous les arcs</option>
      </select>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><span class="stat-val" id="stat-sessions">—</span><span class="stat-lbl">séances</span></div>
        <div class="stat-card"><span class="stat-val green" id="stat-percent">—</span><span class="stat-lbl">réussite moy.</span></div>
        <div class="stat-card"><span class="stat-val" id="stat-kinteki">—</span><span class="stat-lbl">kinteki</span></div>
        <div class="stat-card"><span class="stat-val teal" id="stat-makiwara">—</span><span class="stat-lbl">makiwara</span></div>
      </div>
    </section>

    <hr class="bows-divider">

    <!-- ARCS -->
    <section class="bows-section">
      <h2>Mes arcs</h2>
      <div id="bows-list" class="bows-list"></div>
      <button id="add-bow-btn" class="btn-primary btn-add-bow">+ Nouvel arc</button>
    </section>

    <hr class="bows-divider">

    <!-- EXPORT / IMPORT -->
    <section class="bows-section">
      <h2>Données</h2>
      <div class="data-actions">
        <button id="btn-export" class="btn-data">⬇ Exporter</button>
        <button id="btn-import" class="btn-data">⬆ Importer</button>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
      </div>
    </section>

  </div>

  <!-- Formulaire arc (modal/overlay) -->
  <div id="bow-form-overlay" class="overlay">
    <div class="bow-form-container">
      <h2 id="bow-form-title">Nouvel arc</h2>

      <form id="bow-form">
        <label>
          Nom de l'arc *
          <input type="text" id="bow-name" required>
        </label>

        <div class="form-row">
          <label>
            Puissance (kg)
            <input type="number" id="bow-strength" step="0.5" min="0">
          </label>

          <label>
            Taille
            <select id="bow-size">
              <option value="">Non précisée</option>
              <option value="namisun">Namisun (並寸)</option>
              <option value="nisun">Nisun (二寸)</option>
              <option value="yonsun">Yonsun (四寸)</option>
              <option value="rokusun">Rokusun (六寸)</option>
              <option value="autre">Autre</option>
            </select>
          </label>
        </div>

        <label>
          Couleur
          <div class="color-picker-wrapper">
            <input type="color" id="bow-color" value="#3498db">
            <span id="bow-color-value">#3498db</span>
          </div>
          <div class="color-suggestions" id="bow-color-suggestions"></div>
        </label>

        <label>
          Notes
          <textarea id="bow-notes" rows="3"></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Enregistrer</button>
          <button type="button" id="cancel-bow-form" class="btn-secondary">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Historique -->
  <section class="history-section">
    <h2>Historique</h2>
    <ul id="history"></ul>
  </section>

  <!-- Notification de mise à jour -->
  <div id="update-notification" class="update-notification hidden">
    <p>Une nouvelle version est disponible.</p>
    <div class="notification-actions">
      <button id="update-btn" class="btn-update">Mettre à jour</button>
      <button id="close-notification-btn" class="btn-close" aria-label="Fermer">&times;</button>
    </div>
  </div>

  <!-- Container pour les notifications -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
